    tags:
      - Webhooks Introduction
      - Webhooks
paths:
  /getcatalog:
    get:
      operationId: getCatalog
      summary: Get Catalog of Products
      tags:
        - Products
      description: The **GetCatalog** API can be used to obtain a full list of products
        that are available to a client, also known as the catalog of products.
        The list returned contains basic information about each of the products.
      parameters:
        - in: query
          name: locale
          description: >-
            The locale value which determines the regional settings to use in
            the results, specifically, the language for text fields, like
            product descriptions. If not specified, the default locale used will
            be the one configured for the customer.


            Possible values:

              - `en` - English.
              - `es` - Spanish.
          required: false
          schema:
            type: string
            enum:
              - en
              - es
        - in: query
          name: format
          description: >-
            The format in which to return the data. The default is JSON, but CSV
            format is also possible. It is important to note that when using CSV
            format, the response will be a .csv file.


            Possible values:

              - `json` - JSON format (default).
              - `csv` - CSV (comma-separated values).
          required: false
          schema:
            type: string
            enum:
              - json
              - csv
        # - in: query
        #   name: countryId
        #   description: >-
        #     The country ID for which to obtain the catalog.
        #   required: false
        #   schema:
        #     type: string
        # - in: query
        #   name: includePriceData
        #   description: >-
        #     Determine whether to include price data in the catalog.
        #   required: false
        #   schema:
        #     type: boolean
        #     default: true
        # - in: query
        #   name: includeInventoryData
        #   description: >-
        #     Determine whether to include inventory data or not in the catalog.
        #   required: false
        #   schema:
        #     type: boolean
        #     default: true
        - in: query
          name: inventoryFilter
          description: >-
            Determine whether to return only products in stock, out of stock or all.
            

            Possible values:

              - `Any` - Return products with any stock value.
              - `InStock` - Return products in stock only.
              - `OutOfStock` - Return products out of stock only.
          required: false
          schema:
            type: string
            enum:
              - InStock
              - OutOfStock
              - Any
        - in: query
          name: inStock
          description: Filter for inventory availability. If the value is true, only products in stock (stock value greater than 0) will be returned. If the value is false, only products out of stock (stock value equal to 0) will be returned. Equivalent to sending the inventoryFilter parameter as "InStock" or "OutOfStock".
          required: false
          schema:
            type: boolean    
        - in: query
          name: page
          description: Page number to return. Counting starts from 1. If not specified, the full array is returned.
          required: false
          schema:
            type: integer 
        - in: query
          name: limit
          description: Maximum number of products per page. Only used when the 'page' parameter is provided.
          required: false
          schema:
            type: integer            
      responses:
        "200":
          description: The full list of products that are available for purchase to the
            client.
          content:
            application/json:
              schema:
                  oneOf:
                    - $ref: "#/components/schemas/Product"
                    - $ref: "#/components/schemas/PaginateCatalogData"
              examples:
                Catalog data without pagination:
                  summary: Catalog data without pagination
                  value:
                    - Sku: SE001MSE01
                      Mpn: AAA-01148
                      Brand:
                        ManufacturerId: msf
                        BrandId: msf
                        Description: Microsoft
                      Category:
                        CategoryId: sfw
                        Description: Software
                        Subcategories:
                          - CategoryId: sfw.business
                            Description: Business & Office Applications
                            Subcategories: []
                      Description: Microsoft Access 2019 - download - ESD - Click-to-Run - Win
                        - English
                      Type: Downloadable
                      InStock: 203
                      OnSale: false
                      RealStockValue: true 
                Catalog data with pagination:
                  summary: Catalog data with pagination
                  value:
                    - page: 1
                      pageSize: 5
                      totalRows: 9
                      totalPages: 2
                      data:
                      - Sku: SE001MSE01
                        Mpn: AAA-01148
                        Brand:
                          ManufacturerId: msf
                          BrandId: msf
                          Description: Microsoft
                        Category:
                          CategoryId: sfw
                          Description: Software
                          Subcategories:
                            - CategoryId: sfw.business
                              Description: Business & Office Applications
                              Subcategories: []
                        Description: Microsoft Access 2019 - download - ESD - Click-to-Run - Win
                          - English
                        Type: Downloadable
                        InStock: 203
                        OnSale: false
                        RealStockValue: true

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/InvalidTimeStamp"
                  - $ref: "#/components/schemas/UnauthorizedClientIp"
                  - $ref: "#/components/schemas/InvalidSignature"
                  - $ref: "#/components/schemas/InvalidApiKey"
              examples:
                Request time stamp expired:
                  summary: Request time stamp expired
                  value:
                    Message: Request time stamp no longer valid.
                    ErrorCode: 12
                    Reference: 4b803e62-0cb8-4662-bb5b-a480adb83b57
                    TimeStamp: 2019-10-07T20:38:13.132Z
                Invalid IP address:
                  summary: Invalid IP address
                  value:
                    Message: IP address not registered.
                    ErrorCode: 14
                    Reference: aaa7c14d-b114-4153-b0fb-5681df859b31
                    ClientIp: 10.212.1.214
                Invalid signature:
                  summary: Invalid signature
                  value:
                    Message: Invalid signature.
                    ErrorCode: 10
                    Reference: c59d62a7-6451-4eb1-b27b-7b000aa437f2
                    Signature: 32f22095095553fd3ac2e7381ec4a1478d5ad9b599db83f96e41502ac280136b
                Invalid API key:
                  summary: Invalid API key
                  value:
                    Message: Invalid API Key.
                    ErrorCode: 13
                    Reference: 0caed46c-f116-46c7-a807-c6f94b816cf3
                    ApiKey: 2240e45e-d523-47c4-98a4-0956fc2b0d2f
        # "429":
        #   description: Too Many Requests
        #   content:
        #     application/json:
        #       schema:
        #         $ref: "#/components/schemas/ExcessiveRequests"
        #       example:
        #         Message: Excessive request attempts detected. Please wait 10 seconds
        #           from the last successful attempt before making a new request.
        #         ErrorCode: 100
        #         Reference: 5f3f3d43-bb1b-4381-9cac-305264b700d6
        "500":
          description: General Error
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/IwsException"
              example:
                Message: An error has occurred. Please contact support for assistance.
                Warning: The cause of this exception will most likely NOT be resolved automatically. It is STRONGLY advised NOT to attempt this request again, until the problem has been resolved by our support staff.
                ErrorCode: 900
                Reference: ba8195fe-9d51-448d-a172-59a0c93767fe
                SupportWebsite: https://intcomexsrv.powerappsportals.com/es-ES/create-case-anonymous/
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/IwsException"
              example:
                Message: Invalid response format specified.
                ErrorCode: 102
                Reference: 9b905008-bb61-4565-ad8b-2e5f29d1f5c                                                      
  /getproducts:
    get:
      operationId: getProducts
      summary: Get Products List
      tags:
        - Products
      description: >
        The **GetProducts** API can be used to get a list of products containing
        the ones specified in the request.

        > **Note:** The maximum number of products that can be requested in this list is 100. To get a higher number of products, please chain several request together in batches of 100 products for each request.
      parameters:
        - in: query
          name: skusList
          description: A comma separated list of Intcomex SKUs with all the products to
            obtain in the response. Required if **mpnsList** and **upcsList**
            parameters are not specified.
          required: false
          schema:
            type: string
        - in: query
          name: mpnsList
          description: A comma separated list of manufacturer part numbers (MPN) with all
            the products to obtain in the response. Required if **skusList** and
            **upcsList** parameters are not specified.
          required: false
          schema:
            type: string
        - in: query
          name: upcsList
          description: A comma separated list of UPCs with all the products to obtain in
            the response. Required if **skusList** and **mpnsList** parameters
            are not specified.
          required: false
          schema:
            type: string
        - in: query
          name: locale
          description: >-
            The locale value which determines the regional settings to use in
            the results, specifically, the language for text fields, like
            product descriptions. If not specified, the default locale used will
            be the one configured for the customer.


            Possible values:

              - `en` - English.
              - `es` - Spanish.
          required: false
          schema:
            type: string
            enum:
              - en
              - es
        - in: query
          name: includePriceData
          description: Determine whether to include price data for each product in the
            response.
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: includeInventoryData
          description: Determine whether to include inventory data for each product in the
            response.
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: inventoryFilter
          description: >-
            Determine whether to return only products in stock, out of stock or
            all.


            Possible values:

              - `Any` - Return products with any stock value.
              - `InStock` - Return products in stock only.
              - `OutOfStock` - Return products out of stock only.
          required: false
          schema:
            type: string
            enum:
              - Any
              - InStock
              - OutOfStock
        - in: query
          name: inStock
          description: Filter for inventory availability. If the value is true, only products in stock (stock value greater than 0) will be returned. If the value is false, only products out of stock (stock value equal to 0) will be returned. Equivalent to sending the inventoryFilter parameter as "InStock" or "OutOfStock".
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: An array of products matching all the SKUs specified in the
            'skusList' parameter.
          content:
            application/json:
              schema:
                type: array
