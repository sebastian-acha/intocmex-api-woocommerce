    url: images/INTCOMEX-WebServices-smaller.png
security:
  - BearerAuth: []
servers:
  - url: https://intcomex-prod.apigee.net/v1/
    description: Production
  - url: https://intcomex-test.apigee.net/v1/
    description: Test
tags:
  - name: Products
    description: APIs for interacting with products.
  - name: Orders
    description: APIs for interacting with orders.
  - name: ESD
    description: APIs for interacting with ESD products.
  - name: Miscellaneous
    description: Miscellaneous APIs.
  - name: Webhooks Introduction
    x-displayName: Introduction
    description: | 
      A webhook is a form of communication between applications that allows immediate delivery of notifications when a specific event occurs, eliminating the need for periodic queries. It is useful for real-time events such as updates or changes. Setting up a webhook involves specifying an endpoint URL on the customer’s side to which notifications will be sent.
      
      To enable the sending of notifications, it is necessary to configure the system for each client, activating the corresponding webhook and specifying the delivery **URL**. Please contact the integrations area for this configuration.
      
      ![IWS Entities](images/webhooks.png)

      # Security and Authentication
      A client can guarantee that a notification was sent by the IWS webhook, if the system sends in the request header the same authentication mechanism used in the IWS APIs. [**Find more info here**](#section/Documentation/Security) 
      
      # Request  
      Here is example of JSON structure implemented for webhook notification: 
        
          POST /388e7aab-52fe-4b31-9dfa-e70d30545cbb HTTP/1.1
          Host: webhook.site
          Content-Type: application/json
          Authorization: Bearer Bearer apiKey=f81dd7c9-d5d1-4126-aeaa-be17556d12ae&utcTimeStamp=2024-01-09T20:17:23.472Z&signature=a6f4ce37b32ef747bfba7b82f8b0b48220ed3b4e4ed483ad798e7769229d24d9
          Content-Length: 307

          {
              "CallId": "1c8b8c39-14d7-4641-8db5-607e1e032347",
              "WebhookType": "OrderStatusUpdate",
              "TimeStamp": "2024-01-09T15:17:23.4741638-05:00",
              "Data": [
                  {
                      "OrderNumber": "2020997",
                      "Status": "{\"StatusCode\":1,\"Description\":\"Open\"}"
                  }
              ]
          }
  - name: Webhooks
    description: Below you will find relevant information about webhooks available in IWS.
