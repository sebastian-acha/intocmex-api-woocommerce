openapi: 3.0.0
info:
  title: Intcomex Web Services
  version: 1.92.2.10
  description: >
    # Introduction

    The **Intcomex Web Services**, or **IWS** for short, is a set of web services that allow clients to interact with **Intcomex** to perform operations like obtaining information about products or placing orders programmatically.


    IWS uses Representational State Transfer (REST) to expose its functionality. Clients use the web services through **HTTP requests** using a URL that specifies the operation method and parameters required to obtain the desired information.


    The **HTTP response** from these requests is returned using JSON (by default) or XML formatted responses which contain the results of the call requested.


    IWS can be integrated into a client’s web store, mobile app or any other point of sale to provide a way for end users to place orders directly to Intcomex.



    ![IWS Entities](https://iws.intcomex.com/reference/images/IWS_Entities_2.png)


    For example, an end user can go to a retail web store to purchase a product that is supplied by Intcomex. The retail web store presents the end user with the interface to make the purchase. Once the order is placed, a **request** is made to IWS to place that order to Intcomex, which then returns the details of the order as its **response**. The order obtained is then processed by the website in whatever way it deems necessary, and then a confirmation is sent back to the end user.


    ![Workflow](https://iws.intcomex.com/reference/images/IWS_Workflow.png)


    One of the advantages of using IWS is to enable end customers to purchase software products that can be delivered electronically. These types of products are also known as **ESD** products (**E**lectronic **S**oftware **D**istribution).


    ## ESD

    Over the last few years, thanks to the advances made in the areas of digital storage and networking technologies, this traditional model is being gradually replaced by a new model called Digital Distribution or ESD, in which software bought online can simply be downloaded and installed immediately after purchase or at any other time that the customer chooses.


    Any kind of software can be purchased using this model, from home and business-related applications like Microsoft Office or Windows, to video games.


    Purchasing software in this manner has many advantages over the traditional way, but some of the most important ones are:


      - There is no package or physical media involved so nothing needs to be shipped to the customer. This means that the customer does not have to pay for shipping fees and does not have to wait until the product arrives.
      - The software is available for download immediately after purchase.
      - It can also be downloaded as many times as needed after purchase.


    For a customer to purchase software delivered through the ESD model, they first have to purchase it through some point of sale, in the same way they would buy any other type of product online. Once the order is completed, instead of having to wait for the product to be shipped and delivered, they receive (usually, via email) information on how to download, install and, in some cases, activate the software.


    This information received about the ESD product, also called a fulfillment, contains the details necessary to obtain the software electronically. This can include all or some of these details (depending on the type of software):


      - **Product key** (for activation). Also known as **serial number**.
      - **Link** to download the binary files necessary to install the software.
      - **Instructions** to download and active the software.


    This fulfillment data should also be made available to the customer after the initial purchase through a section in the retailer’s website (sometimes called the **Digital Locker**), where they can download the software as many times as they want, or they can view the product key they need to activate it.


    > **NOTE:** Because of the nature of ESD products, they cannot be returned to Intcomex for credit because product keys are usually used to activate the software once or a limited amount of times and cannot be re-used afterwards (once the product is activated, it can be re-downloaded and re-installed by the same user only an infinite number of times). Please proceed with caution when deploying functionality that allows purchase of ESD products. The retailer should also make sure to warn the end customer of this limitation.


    ## IWS and ESD

    Software made available via ESD model can be purchased by an end customer through the retailer’s point of sale, which would generate an order in Intcomex behind the scenes using IWS (this is the normal process for any type of product, whether it is ESD or not).


    Once the order is successfully created and the details are returned to the retailer, it can request back to IWS the ESD fulfillments (product keys, download links, etc.) from that order. These are then relayed back to the end customer via email, a web page presented onscreen or any other way the retailer chooses to handle it.


    This is the “electronic delivery” part of the ESD transaction and allows the user to obtain the software almost immediately, instead of having to wait for a software box to be delivered physically to them.


    The information contained in the fulfillments should be saved in the retailer’s database and provide an interface through which the users can obtain the fulfillment information at any time (the Digital Locker mentioned before).

    # Documentation
    
    Below you will find information of interest to perform a correct integration with the IWS APIs.

    ## How to Use IWS

    To take advantage of the functionality provided by IWS, the client needs to first comply with certain requirements which are necessary to make requests and responses properly.


    Once those requirements are met, the client can make requests and receive responses using REST, via HTTP messages, whenever necessary from the client’s environment, be it a point of sale like a website or a mobile app, or any other kind of system.


    ### Requirements

    Before a client can use IWS they should make sure that its development team have a good understanding the following concepts:


      - RESTful web services
      - HTTP and HTTPS requests and responses
      - JSON and/or XML


    Additionally, for a client to have access to IWS and its functionality, the following requirements need to be met, which are handled outside the scope of IWS:


      - A customer account must be created in the Intcomex system for the client.
      - A web user account must be created and linked to the client’s customer account.
      - The client’s IPs must be registered in the IWS internal database as security precaution. Only those IPs registered for the client can make requests to IWS. Otherwise, an error is returned.
      - A list of authorized products needs to be defined for the client. These is the list of products that the client has access to place orders for, receive pricing information, etc.


    Once all these requirements are met, the client can begin making requests to IWS.


    ### Client-IWS Interaction

    The basic interaction between the client and IWS is achieved using HTTP requests and responses and can best be represented this way:


    ![Client-IWS Interaction](https://iws.intcomex.com/reference/images/client_iws_interaction.png)


    The steps that take place every time a client sends a request to IWS are the following:


    #### Step 1

    The client sends an **HTTP GET** or **POST** request to IWS. This request includes:


      - The method to perform (GetProducts, PlaceOrder, etc. More on that later)
      - Query string parameters required by the method
      - Content type of the request body and the resulting response (JSON or XML)


    This is an example request to get a list of products:


    `GET https://intcomex-prod.apigee.net/v1/GetProducts?skusList=1000,1001,1002&locale=en`


    This request includes the following elements within the URL:


      - Secure connection (HTTPS is used). This is enforced.
      - Method: **GetProducts** (a method that returns a list of products)
      - Parameters:
      - **skusList**: A list of product SKUs to obtain.
      - **locale**: The locale value that determines the language to return for the descriptions and other text fields.


    An example response from this request in JSON format would look like this:


      ```
      [
      {
        "LocalRecno":"190006",
        "LocalSku":"SE001MSE01",
        "Mpn":"AAA-01148",
        "Manufacturer":{
        "ManufacturerId":"msf",
        "Description":"Microsoft"
        },
        "Brand":{
        "ManufacturerId":"msf",
        "BrandId":"msf",
        "Description":"Microsoft"
        },
        "Category":{
        "CategoryId":"sfw",
        "Description":"Software",
        "Subcategories":[
          {
          "CategoryId":"sfw.business",
          "Description":"Business & Office Applications",
          "Subcategories":[]
          }
        ]
        },
        "Description":"Microsoft Access 2013 - License - 1 PC - download",
        "Price":{
        "UnitPrice":103.5294,
        "CurrencyId":"US"
        },
        "Type":"Downloadable"
      },
      {
        …
      ]
      ```


    #### Step 2

    IWS receives the request and analyses the request. After performing several validations, it determines if the request is valid or not. If all validations are successful, the request is considered valid and IWS then continues to process the information received.


    If, on the other hand, the request is not valid, an **HTTP error response** is sent back to the client. Reasons for failure can vary but some examples are:


      - Invalid credentials (more on that later)
      - Method specified was not found
      - Missing or invalid parameters
      - Internal server errors


    #### Step 3

    IWS generates an **HTTP response** to be sent back to the client. If the processing in step 2 was successful (no validation errors or any other kind of errors were triggered) then the response will contain the data requested or the results of the process that was performed (this depends on the method specified). Successful HTTP responses are always returned with status code 200 (OK).


    However, if there was error triggered in step 2, an HTTP error response is generated instead, which can have some of the following status codes:


      - 400 (Bad Request)
      - 401 (Unauthorized)
      - 403 (Forbidden)
      - 404 (Not Found)
      - 500 (Internal Server Error)


    An example of an HTTP error response would look like this:

      ```
      HTTP/1.1 404 Not Found
      Cache-Control: no-cache
      Pragma: no-cache
      Content-Length: 393
      Content-Type: application/json; charset=utf-8
      Expires: -1
      Server: Microsoft-IIS/8.5
      X-AspNet-Version: 4.0.30319
      X-Powered-By: ASP.NET
      Date: Thu, 12 Mar 2015 19:52:11 GMT
      ```

      
    #### Step 4

    When the processing in step 2 was successful, the HTTP response generated in step 3 is then returned to the client containing the results of the process requested. An example of this can be a list of products, the details of an order or, in the case of ESD products, the ESD fulfillments containing product keys, download links, etc.


    ## REST and HTTP Requests and Responses

    IWS is composed of several REST web services, which means that to access them, the client needs to make HTTP requests and will receive HTTP responses. All HTTP messages (be it request or response) are composed of:


      - The **URL**, containing any query string parameters.
      - The **header**, containing overall information about the data being sent, like the authentication token, size of the data, the formatting, etc.
      - The **body**, containing the actual data. For GET requests, the body is always empty. For POST requests, the body will contain the parameters required by the method being requested. The response bodies contain the results of the method processed, be it a successful result or the details of an error.


    ### The Request

    There are one or two components in the request, depending on whether the method to call requires a GET or a POST request.


    For **GET** requests, all the required data to be sent in the request is included in the query string of the request URL. This includes all the authentication parameters and method-specific parameters.


    For **POST** requests, only the authentication parameters are sent in the query string. The method-specific parameters (if any are required) are included in the body of the request.


    Additionally, one requirement of IWS requests is that the header of the request must include the content type of the data being sent, which can be either JSON or XML. Which one to use is something that is up to the client to decide, however, it is suggested that JSON is used to reduce the size of the requests and responses. JSON is also the default format for responses from GET request if no content type is specified.


    To specify the content type, it is included as a line in the header:


    > Content-type: application/json


    Or


    > Content-type: application/xml


    Here is an example request to place an order in Intcomex through IWS:


      ```
      POST https://intcomex-test.apigee.net/v1/placeorder HTTP/1.1
      Host: intcomex-test.apigee.net
      Authorization: bearer apiKey=21B17E10-351D-40EC-9042-3AD080858584& utcTimeStamp=2015-02-26T15:06:18Z&signature=c99f870db10f4fd62706ef13afc2d6a46f1022e94b4a3c7f5096fb07d14a7296
      Content-type: application/json
      Content-Length: 74

      [{"Sku":"SE001MSE09","Quantity":"10"},{"Sku":"SE001MSE12","Quantity":"5"}]
      ```


    The last line in this request is the body. All the lines above that are the header.


    ### The Response

    The response also contains a header and a body. The header will determine whether the response from IWS was successful or not. The body will contain the actual data of the response, be it the results of a successful request or the details of an error that may have been triggered.


    This is an example of a response that would be obtained from the request above:


