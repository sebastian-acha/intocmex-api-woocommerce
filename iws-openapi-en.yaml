x-webhooks:
  OrderStatusUpdate:
    post:
      summary: OrderStatusUpdate
      operationId: OrderStatusUpdate
      description: This process is responsible for sending notifications when an order changes its status, except if the previous state was "invoiced/closed" or "canceled." These last two are considered final stages of an order, so no notifications will be sent for subsequent changes in them.
      tags:
        - Webhooks
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdateData"
            example:
              CallId: 64724f0b-a308-4c88-ab62-bfc0f85b66be
              WebhookType: OrderStatusUpdate
              TimeStamp: 2023-12-04T23:07:21.513
              Data:
                OrderNumber: "336446"
                Status:
                  StatusCode: 5
                  Description: Invoiced/Closed
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: apiKey={API Key}&utcTimeStamp={UTC timestamp}&signature={generated
        signature}
  schemas:
    Product:
      type: object
      required:
        - Sku
        - Mpn
        - Brand
        - Description
        - Type
      properties:
        Sku:
          type: string
          description: The unique SKU identifier for the product.
          example: SE001MSE01
        Mpn:
          type: string
          description: The manufacturer part number of the product.
          example: AAA-01148
        Manufacturer:
          type: object
          description: Details about the product's manufacturer. (Optional)
          example: Microsoft
        Brand:
          type: object
          description: Details about the product's brand.
          example: XBOX
        Category:
          type: object
          description: The multi-level categorization of the product from Intcomex’s
            internal categorization structure. (Optional)
        Description:
          type: string
          description: The description of the product, in the language specified by the
            Locale parameter or the customer's locale setting (if no locale
            parameter is available).
          example: Microsoft Office 365 - download - ESD - Click-to-Run - Win - English.
        Type:
          type: string
          description: The type of the product. Possible values are
            Physical/License/Warranty/Downloadable.
          example: Downloadable
        ProductLine:
          type: string
          description: The product line of the product, as assigned by the manufacturer or
            brand.
        Model:
          type: string
          description: The model of the product, as assigned by the manufacturer or brand.
        New:
          type: boolean
          description: Determines whether the product is new or not. If “true”, the product
            was created in the last 6 months. Otherwise, this property will
            return “false”. (Optional)
        Price:
          type: object
          description: Price data and currency.
          $ref: "#/components/schemas/PriceData"
        InStock:
          type: integer
          description: The number of units of the product that are in stock (at the moment
            requested).
        Locations:
          type: array
          description: Detailed stock availability per Intcomex warehouse (upon request to
            Intcomex only). If the client is not configured to receive this
            information, it will return as null.
          items:
            $ref: "#/components/schemas/Location"
        OnSale:
          type: boolean
          description: A flag that determines is the product is currently on sale
            (discounted). (Optional)
        Upc:
          type: string
          description: The product’s UPC/EAN. (Optional)
        Freight:
          type: object
          description: Freight information for the product. (Optional)
          items:
            $ref: "#/components/schemas/Freight"
        Components:
          type: array
          description: List of SKUs that belong to the kit as components (only used for kit
            products).
          items:
            type: string
        CompilationDate:
          type: string
          format: date-time
          description: The date and time in which the product content was gathered. Mostly
            useful for pre-built catalogs.
        PrePurchaseStartDate:
          type: string
          format: date-time
          description: The date and time in which the pre-purchase period begins.
        PrePurchaseEndDate:
          type: string
          format: date-time
          description: The date and time in which the pre-purchase period ends.
        PrePurchaseActive:
          type: boolean
          description: Whether the product's pre-purchased period is active (if there is a
            pre-purchase period at all).
        RealStockValue:
          type: boolean
          description: Specify whether the displayed stock is real. If it's false, the stock may be equal to or greater than what is shown.
    Location:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the location.
        Stock:
          type: integer
          description: The number of items of the product currently in stock in the
            location.
    SalesData:
      type: object
      properties:
        Sku:
          type: string
          description: The unique SKU identifier for the product.
          example: SE001MSE01
        Mpn:
          type: string
          description: The manufacturer part number of the product.
          example: AAA-01148
        Price:
          type: object
          description: Price data and currency.
          $ref: "#/components/schemas/PriceData"
        InStock:
          type: integer
          description: The number of units of the product that are in stock (at the moment
            the method was requested).
        Locations:
          type: array
          description: Detailed stock availability per Intcomex warehouse (upon request to
            Intcomex only). If the client is not configured to receive this
            information, it will return as null.
          items:
            $ref: "#/components/schemas/Location"
        OnSale:
          type: boolean
          description: A flag that determines is the product is currently on sale
            (discounted).
    PriceData:
      type: object
      description: Price data and currency.
      required:
        - UnitPrice
        - CurrencyId
      properties:
        Sku:
          type: string
          description: The unique SKU identifier for the product. May not be present if the
            PriceData property belongs to another object where the SKU is
            already available.
          example: SE001MSE01
        Mpn:
          type: string
          description: The manufacturer part number of the product. May not be present if
            the PriceData property belongs to another object where the MPN is
            already available.
          example: AAA-01148
        UnitPrice:
          type: number
          description: Unit price. This price includes any discounts applied to it.
        CurrencyId:
          type: string
          description: The currency ID used for the price.
        PriceTaxAmount:
          type: number
          description: The tax amount calculated based on the unit price and the tax rate.
        PricePlusTax:
          type: number
          description: Unit price plus tax calculated.
        OriginalPrice:
          type: number
          description: Original price (without discounts).
        OriginalPriceTaxAmount:
          type: number
          description: The tax amount calculated based on the original price and the tax
            rate.
        OriginalPricePlusTax:
          type: number
          description: Original price plus tax calculated.
        BasePrice:
          type: number
          description: Base price (without discounts).
        BasePriceTaxAmount:
          type: number
          description: The tax amount calculated based on the base price and the tax rate.
        BasePricePlusTax:
          type: number
          description: Base price plus tax calculated.
        RebateAmount:
          type: number
          description: Amount of the rebate, if available.
        TaxRate:
          type: number
          description: Tax rate used to apply to the price.
    InventoryData:
      type: object
      properties:
        Sku:
          type: string
          description: The unique SKU identifier for the product. May not be present if the
            InventoryData property belongs to another object where the SKU is
            already available.
          example: SE001MSE01
        Mpn:
          type: string
          description: The manufacturer part number of the product. May not be present if
            the InventoryData property belongs to another object where the MPN
            is already available.
          example: AAA-01148
        InStock:
          type: integer
          description: The number of units of the product that are in stock (at the moment
            the method was requested).
        Locations:
          type: array
          description: Detailed stock availability per Intcomex warehouse (upon request to
            Intcomex only). If the client is not configured to receive this
            information, it will return as null.
          items:
            $ref: "#/components/schemas/Location"
        RealStockValue:
          type: boolean
          description: Specify whether the displayed stock is real. If it's false, the stock may be equal to or greater than what is shown.
    Freight:
      type: object
      description: Product freight information.
      properties:
        Item:
          type: object
          description: Item measurements.
        Package:
          type: object
          description: Package measurements.
    SimpleRequestOrder:
      type: object
      properties:
        OrderNumber:
          type: string
          description: The number of the order.
          example: "123456"
    RegisterPaymentRequest:
      type: object
      properties:
        OrderNumber:
          type: string
          description: The number of the order.
          example: "123456"
        Payments:
          type: array
          description: A list of payments made for the order.
          items:
            $ref: "#/components/schemas/Payment"
          example:
            - Amount: 98.54
              Authorization: abc123
              BankName: Marvel Bank
              BankAccount: "12345678"
              PaymentTypeId: ECG3
              Partial: false
    RequestOrder:
      type: object
      properties:
        OrderNumber:
          type: string
          description: The number of the order. Only necesary for requests where the order
            number is known.
          example: "123456"
        LocationId:
          type: string
          description: The location ID from which to get the products included in the
            order. The list of location IDs must be known prior to placing the
            order.
        Tag:
          type: string
          description: A text that can be used to group several orders together under a
            single tag. For example, to group all ESD orders, the tag parameter
            can be used by sending it with “esd” for its value. The text can be
            anything you want but it is recommended to use a single word or as
            few concatenated words as possible, without spaces.
          example: VipOrder
        CustomerOrderNumber:
          type: string
          description: Can be used to send the client’s own order number to Intcomex, so
            that both orders (the client order and the Intcomex order) are
            linked for any reason that may be needed, like reporting or any
            further processing outside the scope of IWS.
          example: "123456"
        Total:
          type: number
          description: The total of the order (B2C orders only).
        Discounts:
          type: number
          description: The discounts amount for the entire order (B2C orders only).
        DiscountType:
          type: string
          description: The type of the discount.
        CouponCodes:
          type: array
          description: A list of coupon codes to be applied to the entire order.
          items:
            type: string
          example:
            - may10
            - joker1
        TaxRegistrationNumber:
          type: string
          description: The tax registration number to be used for the order.
        InvoiceRequested:
          type: boolean
          description: A flag that determines if the invoice has been requested by the
            customer.
        ReceiveInvoiceByMail:
          type: boolean
          description: A flag that determines if the invoice is to be sent to the customer
            by email.
        StoreOrder:
          $ref: "#/components/schemas/StoreOrder"
        Payments:
          type: array
          description: A list of payments made for the order.
          items:
            $ref: "#/components/schemas/Payment"
          example:
            - Amount: 98.54
              Authorization: abc123
              BankName: Marvel Bank
              BankAccount: "12345678"
              PaymentTypeId: ECG3
              Partial: false
        Shipments:
          type: array
          description: A list of shipments attached to the order.
          items:
            $ref: "#/components/schemas/Shipment"
          example:
            - FreightService: mienvio
              FreightShipmentId: "123456789"
              ServiceType: express
              CarrierId: abcd
              Amount: 8.95
              TrackingId: 202333413
              TrackingUrl: https://laterminalexpress.com/
              LabelUrl: https://s3.amazonaws.com/mienvio/1700772675_202333413.pdf
        Items:
          type: array
          description: "The list of items to be ordered, including SKUs and quantities for
            each. The items are of type 'RequestOrderItem':"
          items:
            $ref: "#/components/schemas/RequestOrderItem"
          example:
            - Sku: SE001MSE09
              Quantity: "10"
            - Sku: SE001MSE12
              Quantity: "5"
        TaxesIncludedInPrice:
          type: boolean
          description: Indicates whether the price of all the items in the order include
            the taxes or not.
        Attachments:
          type: array
          description: A list of documents to upload and attach to an order. Files could be
            in ZPL (prefered) or PDF format. The ZPL document must have a size of 4x5 inches or 10x15 cm,
            also, the guide must be in thermal printer format and the layout must be as specified by the transport company.
          items:
            $ref: "#/components/schemas/Attachment"
        Options:
          $ref: "#/components/schemas/Options"
        AddressId:
          type: number
          description: The code of the address to ship the order's products (obtained from the list of addresses in Trax).
          example: "3"
    RequestOrderItem:
      type: object
      properties:
        Sku:
          type: string
          description: The Intcomex SKU of the product to be included in the order.
          example: SE001MSE09
        Quantity:
          type: integer
          description: The unit quantity of the product to order.
        Price:
          type: number
          description: The price to be applied to the product line (B2C orders only).
        Discounts:
          type: number
          description: The discounts amount for the item (B2C orders only).
        DiscountType:
          type: string
          description: The type of the discount.
        CouponCodes:
          type: array
          description: A list of coupon codes to be applied to the order item.
          items:
            type: string
          example:
            - may10
            - joker1
        StoreItemId:
          type: string
          description: An optional field to specify a custom ID for the product within the
            order item.
        TaxesIncludedInPrice:
          type: boolean
          description: Indicates whether the price of the item includes the taxes or not.
            Overrides the setting in the RequestOrder header.
    SalesOrder:
      type: object
      properties:
        OrderNumber:
          type: string
          description: The Intcomex order number generated.
        OrderDate:
          type: string
          format: date-time
          description: The date and time in which the order was created.
        Customer:
          type: object
          description: The details of the client’s Intcomex customer account.
        CustomerOrderNumber:
          type: string
          description: The customer order number specified when placing the order.
        StoreOrder:
          $ref: "#/components/schemas/StoreOrder"
        Items:
          type: array
          description: "The list of items included in the order. The items are of type
            'SalesOrderItem':"
          items:
            $ref: "#/components/schemas/SalesOrderItem"
        ItemCount:
          type: integer
          description: The number of items in the order.
        CouponCodes:
          type: array
          description: A list of coupon codes applied to the entire order.
          items:
            type: string
          example:
            - may10
            - joker1
        TaxRegistrationNumber:
          type: string
          description: The tax registration number used for the order.
        InvoiceRequested:
          type: boolean
          description: A flag that determines if the invoice has been requested by the
            customer.
        ReceiveInvoiceByMail:
          type: boolean
          description: A flag that determines if the invoice is to be sent to the customer
            by email.
        Payments:
          type: array
          description: A list of payments made for the order (B2C orders only).
          items:
            $ref: "#/components/schemas/Payment"
          example:
            - Amount: 98.54
              Authorization: abc123
              BankName: Marvel Bank
              BankAccount: "12345678"
              PaymentTypeId: ECG3
              Partial: false
        Shipments:
          type: array
          description: A list of shipments attached to the order (B2C orders only).
          items:
            $ref: "#/components/schemas/Shipment"
          example:
            - FreightService: mienvio
              FreightShipmentId: "123456789"
              ServiceType: express
              CarrierId: abcd
              Amount: 8.95
              TrackingId: 202333413
              TrackingUrl: https://laterminalexpress.com/
              LabelUrl: https://s3.amazonaws.com/mienvio/1700772675_202333413.pdf
        OnHold:
          type: boolean
          description: A flag that specifies if the order is on hold.
        HoldReason:
          type: string
          description: The reason for an order hold.
        HoldId:
          type: string
          description: Identifier for the order hold.
        PaymentOriginalDoc:
          type: string
          description: Payment identifier in the ERP.
        TotalPayments:
          type: number
          description: The total amount of payments registered for the order.
        Status:
          $ref: "#/components/schemas/TransactionStatus"
        Currency:
          type: object
          description: The currency in use for the price amounts displayed in the order.
        Comments:
          type: string
          description: Comments added to the order.
        TaxRate:
          type: number
          description: The tax rate applied to the subtotal of the order.
        OtherFees:
          type: string
          description: Any additional fees that were applied.
        Subtotal:
          type: object
          description: The subtotal amount, including the currency used, actual amount and
            amount in home currency (if currency is in dollars).
        Discounts:
          type: object
          description: Total discount amount applied, including the currency used, actual
            amount and amount in home currency (if currency is in dollars).
        DiscountType:
          type: string
          description: The type of the discount.
        Tax:
          type: object
          description: Tax amount applied, including the currency used, actual amount and
            amount in home currency (if currency is in dollars).
        ShippingFee:
          type: object
          description: Shipping fee amount applied, including the currency used, actual
            amount and amount in home currency (if currency is in dollars).
        Total:
          type: object
          description: The total amount, including the currency used, actual amount and
            amount in home currency (if currency is in dollars).
        Tag:
          type: string
          description: The tag applied to the order at the moment it was created.
        PrintedInvoiceNumber:
          type: string
          description: The printed invoice number of the order.
        CarrierId:
          type: string
          description: The ID of the carrier.
        WaybillDocumentAvailable:
          type: boolean
          description: A flag to inform whether the order has a waybill document available.
        Attachments:
          type: array
          description: A list of documents attached to the order.
          items:
            $ref: "#/components/schemas/Attachment"
          example:
            - Type: waybill
              Description: Waybill Document 1
              FileName: waybilldoc1.pdf
              Content: JVBERi0xLjQKJeLjz9MKMyAwIG9iago8PC9Db2xvcl...
            - Type: fiscal
              Description: Fiscal Document 1
              FileName: fiscaldoc1.pdf
              Content: JVBERi0xLjQKMSAwIG9iago8PAovVHlwZSAvQ2F0Y...
        SerialNumbers:
          type: array
          description: List of serial numbers of invoiced products.
          items:
            $ref: "#/components/schemas/SerialNumber"
        AddressNo:
          type: number
          description: The address ID associated with the order (These fields will only be visible in the response of the request if the client has the "Validate address ID" setting enabled).
        Ship-Address:
          type: array
          description: Shipping address information associated with the AddressId (These fields will only be visible in the response of the request if the client has the "Validate address ID" setting enabled).
          items:
            type: string
        PickNumber:
          type: number
          description: The pick number associated with the order (if available).
        PickDate:
          type: string
          description: The creation date of the pick.
        PackNumber:
          type: number
          description: The pack number associated with the order (if available).
        PackDate:
          type: string
          description: The creation date of the pack.
    TransactionStatus:
      type: object
      description: The status of a transaction, represented by a status code and a
        description.
      properties:
        StatusCode:
          type: integer
          description: The status code number.
        Description:
          type: string
          description: The description of the status.
    SalesOrderItem:
      type: object
      properties:
        LineNumber:
          type: integer
          description: The order item's line number in the order.
        Product:
          type: object
          description: The actual product in the order item.
          items:
            $ref: "#/components/schemas/Product"
        Quantity:
          type: integer
          description: The unit quantity ordered of the product.
        LocationId:
          type: string
          description: The warehouse location from which the product was ordered.
        UnitPrice:
          type: object
          description: The unit price of the product, including the currency used, actual
            amount and amount in home currency (if currency is in dollars).
        ExtendedPrice:
          type: object
          description: The extended price of the product (UnitPrice x Quantity), including
            the currency used, actual amount and amount in home currency (if
            currency is in dollars).
        Discounts:
          type: number
          description: The discounts amount for the item (B2C orders only).
        DiscountType:
          type: string
          description: The type of the discount.
        CouponCodes:
          type: array
          description: A list of coupon codes applied to the order item.
          items:
            type: string
          example:
            - may10
            - joker1
        StoreItemId:
          type: string
          description: An a custom ID for the product specified by a client.
        Comments:
          type: string
          description: Comments added to the line.
        Components:
          type: array
          description: Component items included in the current line (applies to bundled
            products).
          items:
            $ref: "#/components/schemas/Product"
        TaxesIncludedInPrice:
          type: boolean
          description: Indicates whether the price of the item includes the taxes or not.
    StoreOrder:
      type: object
      description: Information about the end customer order (only used by B2C resellers).
      properties:
        StoreId:
          type: string
          description: The unique ID to identify the reseller's store. Not required when
            placing an order.
        StoreOrderNumber:
          type: string
          description: The order number generated by the store for its end customer.
        Customer:
          $ref: "#/components/schemas/StoreOrderCustomer"
        Billing:
          $ref: "#/components/schemas/StoreOrderAddress"
        Shipping:
          $ref: "#/components/schemas/StoreOrderAddress"
        DeliveryType:
          type: string
          description: The type of delivery selected by the end customer.
        OrderTotal:
          type: number
          description: The total amount of the store order.
        BusinessType:
          type: string
          description: The business type related to the end customer.
    StoreOrderCustomer:
      type: object
      description: Information about a reseller store's end customer.
      properties:
        FirstName:
          type: string
          description: The end customer's first name.
        LastName:
          type: string
          description: The end customer's last name.
        Email:
          type: string
          description: The end customer's email address.
        DocumentId:
          type: string
          description: The end customer's ID (driver's license, passport, library card, etc.
    StoreOrderAddress:
      type: object
      description: Information about a store address.
      properties:
        FirstName:
          type: string
          description: The end customer's first name.
        LastName:
          type: string
          description: The end customer's last name.
        Email:
          type: string
          description: The end customer's email address.
        DocumentId:
          type: string
          description: The end customer's ID (driver's license, passport, library card, etc.
        Cellphone:
          type: string
          description: The end customer's cell phone number.
        LandLinePhone:
          type: string
          description: The end customer's land line telephone number.
        OtherPhone:
          type: string
          description: The end customer's telephone number (as an alternative).
        Address:
          type: string
          description: A real-world address.
        SuiteNumber:
          type: string
          description: The suite or apartment number of the end customer (if available).
        ComplexName:
          type: string
          description: The complex name where the apartment number of the end customer (if
            available).
        LastLocalizationReference:
          type: string
          description: The localization reference of the end customer (if available).
        State:
          type: string
          description: The state of the end customer (if available).
        StateId:
          type: string
          description: The state ID of the end customer (if available).
        City:
          type: string
          description: The city of the end customer (if available).
        Neighborhood:
          type: string
          description: The neighborhood of the end customer (if available).
        PostalCode:
          type: string
          description: The postal/zip code of the end customer (if available).
        CountryId:
          type: string
          description: The country of the end customer (if available).
    DigitalProduct:
      type: object
      properties:
        Sku:
          type: string
          description: The unique SKU identifier for the product.
          example: SE001MSE01
        Tokens:
          type: array
          description: Contains all the tokens obtained for the product.
          items:
            $ref: "#/components/schemas/Token"
        TokenType:
          type: string
          description: The type of the token, like for example, serial number, redeemable
            code, etc.
        TokenDescription:
          type: string
          description: An explanation of what the token it is.
        LinkType:
          type: string
          description: The type of the download link (if a link is available).
        LinkDescription:
          type: string
          description: An explanation of what the download link is (if a link is available).
        VendorOrderId:
          type: string
          description: The order ID or number generated on the software provider’s system,
            for reference purposes. Not all providers return this information.
        OrderStatus:
          type: string
          description: The status of the order on the software provider’s system.
        Status:
          type: string
          description: "The status of the token generation request. Possible values are:
            'Ok' / 'TokensAlreadyReceived'."
        StatusAvailable:
          type: boolean
          description: Determines whether the status of the token is final. If true, the token status is no longer expected to change.
        TokenCount:
          type: integer
          description: Total number of tokens returned.
    Token:
      type: object
      properties:
        ProductKey:
          type: string
          description: The product key received.
          example: Q3HMK-2GKQF-26G4X-4M76Y-99999
        LinkUrl:
          type: string
          description: The link address that the client can go to, for downloading of the
            software, or activate/redeem a product key.
    TokenStatus:
      type: object
      description: Represents the status of a token. The actual structure of the response
        varies depending greatly on the vendor of the ESD product.
      properties:
        Status:
          type: string
          description: The status of the product key. Possible values include (but are not
            limited to) “Available”, “Activated”, “Invalid”, “Suspended”, etc.
          example: Activated
        Description:
          type: string
          description: The description of the product that the product key belongs to.
          example: OMXTC-11135 O15 - Access 2013 - Perp - Token - Retail - WW
        PromotionName:
          type: string
          description: The name of the promotion under which the product was purchased.
            Most of the time this will be empty.
        RedemptionDate:
          type: string
          format: date-time
          description: The date on which the product key was redeemed. Product keys can
            only be redeemed once.
        ActivationDate:
          type: string
          format: date-time
          description: Similar to RedemptionDate.
        LastStatusDate:
          type: string
          format: date-time
          description: The date on which the status was set.
        Amount:
          type: number
          description: The money amount currently available for the product key (applies to
            gift cards only).
        CurrencyId:
          type: string
          description: The currency ID of the money amount available (applies to gift cards
            only).
    Place:
      type: object
      properties:
        Id:
          type: integer
          description: The ID of the place.
        Name:
          type: string
          description: The name of the place.
        Level:
          type: string
          description: The level of the place.
        ParentId:
          type: integer
          description: The ID of the parent place to which the place belongs.
        AreaCode:
          type: string
          description: Area code of the place.
        PostalCode:
          type: string
          description: Postal code of the place.
        StateId:
          type: string
          description: The state ID of the place.
    Payment:
      type: object
      properties:
        PaymentId:
          type: number
          description: An ID assigned by IWS to the payment.
        Amount:
          type: number
          description: The amount of the payment.
        Memo:
          type: string
          description: Comments related to the payment.
        Authorization:
          type: string
          description: The authorization code obtained from the payment.
        BankName:
          type: string
          description: The name of the bank involved in the payment transaction, if
            available.
        BankAccount:
          type: string
          description: The bank account number used in the payment transaction, if
            available.
        PaymentTypeId:
          type: string
          description: The type of payment used. The value can not be null.
        Partial:
          type: boolean
          description: Whether the amount in the payment is for the total amount of the
            order or for only part of it.
    Shipment:
      type: object
      properties:
        ShipmentId:
          type: number
          description: An ID assigned by IWS to the shipment.
          readOnly: true
        FreightService:
          type: string
          description: An identifier specifying the freight service being used for the
            shipment.
          example: mienvio
        FreightShipmentId:
          type: string
          description: ID generated by the freight service to identify the shipment.
        ServiceType:
          type: string
          description: The type of shipping service.
        PackingType:
          type: string
          description: The type of packing service.
        CarrierId:
          type: string
          description: The carrier ID to use for the shipment.
        Amount:
          type: number
          description: The amount of the shipping fee associated with the shipment.
        FreightCost:
          type: number
          description: The freight cost of the shipment.
        TrackingId:
          type: string
          description: ID generated by the freight service to identify the trackingid of the shipment
        TrackingUrl:
          type: string
          description: ID generated by the freight service to identify the TrackingUrl of the shipment
        LabelUrl:
          type: string
          description: URL with the PDF file of the shipping detail
      required:
        - ServiceType
        - Amount
    TaxIdValidation:
      type: object
      properties:
        CountryId:
          type: string
          description: The country ID to which the tax ID validation belongs.
        PersonType:
          type: string
          description: The type of person using the tax ID.
        DocumentType:
          type: string
          description: The type of document of the tax ID.
        DocumentName:
          type: string
          description: The name of the document of the tax ID.
        TaxIdFormat:
          type: string
          description: The required format for the tax ID to be valid.
        Example:
          type: string
          description: One or more examples of valid tax IDs.
        MinimumLength:
          type: integer
          description: The minimum length of characters that the tax ID must have to be
            valid.
        MaximumLength:
          type: integer
          description: The maximum length of characters that the tax ID must have to be
            valid.
        ValidationDescription:
          type: string
          description: A description of the requirements needed for the tax ID to be valid.
    Invoice:
      type: object
      properties:
        InvoiceNumber:
          type: string
          description: The invoice number generated.
        InvoiceDate:
          type: string
          format: date-time
          description: The date and time in which the invoice was created.
        Customer:
          type: object
          description: The details of the client’s Intcomex customer account.
        OnHold:
          type: boolean
          description: A flag that specifies if the invoice's order is on hold.
        FiscalPeriod:
          type: number
          description: A number representing the fiscal period.
        FiscalYear:
          type: number
          description: A number representing the fiscal year.
        TransactionAmount:
          type: object
          description: The amount of the transaction.
        ExchangeRate:
          type: number
          description: The currency exchange rate used.
        DiscountsAmount:
          type: object
          description: The amount of the discounts applied to the invoice's order.
        DiscountableAmount:
          type: object
          description: The amount of the transaction that can have discounts applied.
        SalesAmount:
          type: object
          description: The amount of the sales order.
        Comments:
          type: string
          description: Comments added to the invoice.
        PaymentNotes:
          type: string
          description: Notes related to the payment of the order.
        BankId:
          type: string
        DepositNumber:
          type: number
          description: The number of the deposit made, if available.
        FullyPaid:
          type: boolean
          description: Flag to determine whether the order has been fully paid.
        FullyPaidDate:
          type: string
          format: date-time
          description: The date in which the order was fully paid.
        DueDate:
          type: string
          format: date-time
          description: The due date for payment of the order.
        TermId:
          type: string
          description: The term ID.
        EntryNumber:
          type: number
          description: Entry number for the payment.
        Pseudo:
          type: boolean
          description: Pseudo.
        Voided:
          type: boolean
          description: Flag to determine whether the invoice has been voided.
        PayByCheque:
          type: boolean
          description: Whether the payment was made by check or not.
        RefundPaid:
          type: boolean
          description: Whether a refund has been paid.
        MultiTerm:
          type: boolean
          description: Whether the payment is done in a single or multiple terms.
        AutoFax:
          type: boolean
          description: Autofax.
        Official:
          type: boolean
          description: Whether the payment is the official one.
        CreditCardAuthorizationCode:
          type: string
          description: The authorization code of a credit card payment.
        CreditCardTransactionId:
          type: string
          description: The transaction ID of the the credit card payment.
        OrderEmail:
          type: string
          description: Email address to which the order confirmation was sent.
        RebateNumber:
          type: number
          description: The rebate number assigned to the order.
        TaxRegistrationNumber:
          type: string
          description: The tax registration number used for the order.
        Currency:
          type: object
          description: The currency in use for the price amounts displayed in the order.
        CarrierId:
          type: string
          description: The ID of the carrier.
        InvoiceUrl:
          type: string
          description: The URL from which an invoice PDF document can be downloaded.
        InvoiceUrlXML:
          type: string
          description: The URL from which an invoice XML document can be downloaded.
    Attachment:
      type: object
      properties:
        Type:
          type: string
          enum:
            - waybill
            - fiscal
            - unknown
          description: The type of the attachment document. The possible values at the
            moment are 'waybill' or 'fiscal'
          example: waybill
        Description:
          type: string
          description: A small description explaining what the attached document is.
          example: "Waybill Document #1"
        FileName:
          type: string
          description: The name of the attachment file and must be "guia_zebra.txt" if it is a ZPL file or "guia_pdf.pdf" if it is a PDF file.
          example: guia_zebra.txt
        Content:
          type: string
          description: The actual file encoded as a base-64 string.
          example: JVBERi0xLjYKJc684b+mCgoxIDAgb2JqCjw8CiAgL0dyb3VwIDw8CiAgICAvUyAvVHJhbnNwYXJlbm...
    SerialNumber:
      type: string
    ShippingRate:
      type: object
      properties:
        Id:
          type: integer
          description: The ID of the shipping rate. When placing an order, this ID is what
            needs to be included in the place order request to specify the rate
            to use.
          example: 76450
        Amount:
          type: number
          description: The cost amount of the shipping rate.
          example: 10.5
        CurrencyId:
          type: string
          description: The currency used for the rate cost.
        MinimumWeight:
          type: number
          description: The minimum weight allowed for the shipping rate.
        MaximumWeight:
          type: number
          description: The maximum weight allowed for the shipping rate.
        ServiceType:
          type: string
          description: The name of the service to use with the shipping rate.
          example: estandar
        DurationTerms:
          type: string
          description: The terms related to the shipping rate, like estimated delivery
            timeframe.
          example: Entrega en 24-72 horas
        Days:
          type: integer
          description: The estimated number of days for the shipment to be delivered.
        Trackable:
          type: boolean
          description: Whether the shipment can be tracked or not with the service.
        CollectHome:
          type: boolean
        Provider:
          type: string
          description: The name of the shipping provider.
        ProviderImage:
          type: string
          description: The provider's logo image, which can be used in a web page.
        ExtendedZone:
          type: boolean
          description: Whether the shipment can be done within an extended zone.
        ServiceId:
          type: string
        OwnerContract:
          type: boolean
    IwsException:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: An error has occurred. Please contact support for assistance.
        Warning:
          type: string
          description: A warning message that indicates actions to do in order to avoid posible new problems.
          example: The cause of this exception will most likely NOT be resolved automatically. It is STRONGLY advised NOT to attempt this request again, until the problem has been resolved by our support staff.
        ErrorCode:
          type: integer
          description: The error code number of the error.
          example: "900"
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
          example: 4f1ce513-26c6-4c00-9915-717310aba389
        SupportWebsite:
          type: string
          description: An URL to create a ticket for assistance request.
    InvalidTimeStamp:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: Request time stamp no longer valid.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        TimeStamp:
          type: string
          description: The time stamp detected.
    UnauthorizedClientIp:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: IP address not registered.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        ClientIp:
          type: string
          description: The unauthorized IP detected.
    InvalidSignature:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: Invalid signature.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        Signature:
          type: string
          description: The invalid signature detected.
    InvalidApiKey:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: Invalid API Key.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        ApiKey:
          type: string
          description: The invalid API key detected.
    ExcessiveRequests:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
          example: Excessive request attempts detected. Please wait 10 seconds from the
            last successful attempt before making a new request.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
    InvalidRequest:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
    UnauthorizedProduct:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        Sku:
          type: string
          description: The SKU of the unauthorized product.
    InvalidProduct:
      type: object
      properties:
        Message:
          type: string
          description: The error message.
        ErrorCode:
          type: integer
          description: The error code number of the error.
        Reference:
          type: string
          description: A reference string that can be used by technical support to help
            identifying the error and resolving the issue.
        Sku:
          type: string
          description: The SKU of the invalid product.
    InvalidOrder:
      type: object
      properties:
