        "MessageDetail": "No action was found on the controller 'IwsApi' that matches the name 'placeorder'."
      }
      ```


    In this case, the first line of the header says `404 Not Found`, which means status code 404, the HTTP code used when the request is for something on the server that does not exist (like when going to a web page in a website that is not valid).


    The body of this response contains the details of the error that was triggered. More on errors in the next section.


    > **NOTE:** Please be aware that the order in which the fields are returned in the response can vary from time to time, so it is recommended never to develop applications that consume this data expecting always the same order. **Doing so, can break your internal processes or have unforeseen consequences.**


    ### Recommended Applications

    To assist during development, it is strongly recommended to use the following applications:


    1. **Postman**: This is the most popular application for REST based APIs, making it extremely simple to test them. It includes a wide range of tools that can help during the development process, like debugging, unit testing or even creating your own APIs. It can be downloaded for free from the following address: https://www.getpostman.com/


    2. **Fiddler**: Provides extensive information about all HTTP requests and responses going out from a server or computer and going in. It can assist tremendously for debugging, but it is not as user-friendly as Postman. It can be downloaded for free from the following address: http://www.telerik.com/fiddler


    ## Security

    There are several layers of security employed in IWS to ensure that the information transmitted between client and web service is secured. These layers are:


      - SSL Connection
      - IP Binding
      - Token Authentication
      - Request Expiration


    The entire flow of the authentication process can best be represented this way:


    ![Authentication Process](https://iws.intcomex.com/reference/images/authentication_process.png)


    ### SSL connection

    A secured HTTP connection or HTTPS is required for all requests being made from the client to IWS. When building the URL for the request, always make sure to prefix it with “https://...” instead of “http://...”. Otherwise, a 403 HTTP error response will be returned.


    ### IP Binding

    All clients making requests need to have their IPs registered in IWS to ensure that only those authorized computers can make requests. If the IP of the client making the request is not registered, an HTTP error response is also returned. Registration of the IPs is done manually by contacting IWS technical support. In a future version an administration tool will be made available to configure settings like this one.


    ### Token Authentication

    All requests made to IWS need to include security information that can establish the identity of the client. This is necessary because IWS is a state-less web service, which means that all requests made to IWS from the same client are separate from one another. There is no login step to start a session, like one would see when signing in to a website.


    Because of this, the client credentials need to be passed to IWS without having to send a username and password in clear-text (which would be extremely insecure) in a request URL. Instead, a **token** is required, which is a specific set of keys along with a **signature**. These must be included in the request so that IWS can then to validate the identity of the client. The signature is a hashed value which is generated based on the keys, plus a secured **access key** that is provided for every user registered to the customer.


    Building this token is a process that needs to be done for every request made to IWS (it is strongly recommended that the construction of the token be encapsulated within a function that can be called easily when making the request). This will be explained in more detail in the next section.


    #### Building a Token

    IWS uses token authentication to establish a secure communication between the client and the APIs. This allows IWS to identify the credentials of the client making a request without the need to sign in, generate a session or send username and password in clear text over an HTTP connection.


    This is achieved by building a token, which is done by using a public-key/private-key type of authentication. For every request made by the client, there needs to be a process to build the request URL that contains the following parameters:


      - **API Key**
      This is a unique key that is assigned to the Intcomex customer account that was created for that client.
      - **UTC Time Stamp**
      The time stamp mentioned before that ensures that every request is valid for only 5 minutes at a time. It must use the current UTC time, instead of the local time, to avoid time zone conflicts. The format in which the time stamp is passed must be: `YYYY-MM-DDTHH:mm:ssZ`
      For example, if the current date and UTC time are January 20th, 2020 at 5:10 PM, the time stamp would be: `2020-01-20T15:10:00Z`
      - **Signature**
      The signature is a value that must be generated by the client by following certain steps. One of the requirements to generate the signature is the **secure access key** that was provided by Intcomex for the client. This is the private-key portion of the authentication process and, as the name implies, this access key should be kept secret and never be shared with anyone. **The client is responsible for maintaining the security of this access key.** How to generate this signature exactly will be explained in the next sub-section.
      This signature is compared against a signature generated on the web service side once it receives the request from the client. If both signatures match, the request is valid. Otherwise, an error is returned.


    A fully secure and signed token would then look like this:


    > apiKey=21B17E10-351D-40EC-9042-3AD080858584&utcTimeStamp=2015-02-26T15:06:18Z&signature=c99f870db10f4fd62706ef13afc2d6a46f1022e94b4a3c7f5096fb07d14a7296


    Notice that only the public key (the API key) is included in the token (along with UTC timestamp and the signature). **The secret access key provided to the client should never be included in the token, request URL or the body of the request in any way**. It is only used to generate the signature (which will be explained in a moment). That is why the access key is considered the private key and should never be shared.


    Once the request is received by IWS, the same steps that were taken by the client to generate the signature are then taken on the web service side. If the signature generated by the web service is a perfect match with the one received from the client, then the request is considered safe and coming from the expected client. Otherwise, an HTTP error response is returned.


    Tokens can be included in the request in two ways:


      - Authorization header (preferred)
      - Query string parameters


    Both options offer the same level of security, so choosing one over the other is mostly a matter of preference by the client's development team.


    However, authorization header is the first option that IWS checks when validating the request. If the authorization header is not present (meaning that there is no authorization header at all), then the querystring parameters are evaluated next.


    #### Authorization header ####

    The token must be included as a **bearer** in the **Authorization** request headers. This is an example of such a request:


      ```
      POST /api/iwsapi/GenerateTokens?runAsTask=false HTTP/1.1
      Host: iws.intcomex.com
      Content-Type: application/json
      Authorization: Bearer apiKey=21B17E10-351D-40EC-9042-3AD080858584&utcTimeStamp=2015-02-26T15:06:18Z&signature=c99f870db10f4fd62706ef13afc2d6a46f1022e94b4a3c7f5096fb07d14a7296

      {
        "OrderNumber": "1861733"
      }
      ```


    > **NOTE:** Sending the authorization header in the request with any value, will trigger the header validation in IWS and will result in an error if such value is not a valid token.


    #### Query string parameters ####

    > **NOTE:** While allowed, it's generally poor practice to pass the API key in a query parameter. The reason is because query params can appear in the browser history and network logs, which presents a possible security risk. A better practice is to place the API key in a header, which will not appear in log files. See the **Authorization header** section above.

    The token must be included in the request URL as querystring parameters, in addition to whatever other parameters are required for the specific method being used.


    A fully secure and signed request URL would then look like this:


      ```
      POST /api/iwsapi/GenerateTokens?apiKey=21B17E10-351D-40EC-9042-3AD080858584&utcTimeStamp=2015-02-26T15:06:18Z&signature=c99f870db10f4fd62706ef13afc2d6a46f1022e94b4a3c7f5096fb07d14a7296&runAsTask=false HTTP/1.1
      Host: iws.intcomex.com
      Content-Type: application/json

      {
        "OrderNumber":"1861733"
      }
      ```


    For readability, here is the same URL with all parameters in separate lines:


    > \[base-url\]/GenerateTokens > <br> > ?**apiKey**=21B17E10-351D-40EC-9042-3AD080858584 > <br> > &**utcTimeStamp**=2015-02-26T15:06:18Z > <br> > &**signature**=c99f870db10f4fd62706ef13afc2d6a46f1022e94b4a3c7f5096fb07d14a7296 > <br> > &**runAsTask**=false > <br>


    ### Generating the Signature

    The signature part of the token is the result of applying a hash algorithm to what is called the **signing key**.


    The client making a request to IWS will have to go through the following 2-step process to generate the signature:


    1. Build the signing key by creating a comma-separated string using the following values:
      * The **API key** provided by Intcomex to the client (public key).
      * The user’s **Access Key** (the private key), also provided by Intcomex to the client and which must remain secret always.
      * UTC time stamp


    ![Token Authentication](https://iws.intcomex.com/reference/images/token_auth.png)


    2. Apply the **SHA-256 hashing algorithm** to the signing key to obtain the signature. The resulting string from doing this will be the signature: `9c6151ff51fac712cc596c4fc0a8b65482e262e7391f8cbab6c7d5b8a386fbc3`


    After obtaining the signature, the client simply needs to build the token as mentioned above, (along with the API key and the UTC time stamp), and then include it in the request as either the authorization header as a **bearer** token, or in the query string of the request URL, in addition to any other method-specific parameters that may be required.


    ### Request Expiration

    One of the keys used for the token authentication and as part of the signature is a time stamp, which is the exact date and time (down to the second) in which the request is being made. All requests are valid only for the first 5 minutes after the time stamp specified.


    For example, if the time stamp for a request is 4:35 PM, that request URL will be valid only until 4:40 PM. After that, an error response is returned. To repeat a request and get a successful response, a new URL needs to be built using a more recent time stamp and a different signature.


    ## Error Handling

    All errors returned in a response are formatted as such:

      ```
      {
        "Message": "This is an error message.",
        "ErrorCode": 999,
        "Reference": "8db2395e-79e4-41f2-b031-ce8132e9b19b"
      }
      ```

    Depending on the error, the response may also include additional fields with information that can be useful for solving the problem. For example:

      ```
      {
        "Message": "Unauthorized product. Please refresh your catalog to obtain an updated list of authorized products.",
