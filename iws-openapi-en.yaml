    In this response, the header is the section above the empty line. Everything else is the body.


    This request was successful because the first line in the header of the response (which determines the status code that was returned) says “200 OK”, which means that the status code is 200, the HTTP code used for a successful response.


    If the request is not successful, an HTTP error response is returned instead, that would look like this:


      ```
      HTTP/1.1 404 Not Found
      Cache-Control: no-cache
      Pragma: no-cache
