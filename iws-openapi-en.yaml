  /processorder:
    post:
      operationId: processOrder
      summary: Process order
      tags:
        - Orders
      description: When the customer is ready to place an order, the **ProcessOrder** API is called, which expects a 
        list of products with quantities to be included in the order. If successful, this API generates and 
        returns a process object that can be consulted to get the status of the placed order using the [**GetProcess API**](/reference/api.html#tag/Miscellaneous/operation/GetProcess).
      parameters:
        - in: query
          name: locale
          description: >-
            The locale value which determines the regional settings to use in
            the results, specifically, the language for text fields, like
            product descriptions. If not specified, the default locale used will
            be the one configured for the customer.


            Possible values:

              - `en` - English.
              - `es` - Spanish. If not specified, the locale used will be the one configured for the customer.
          required: false
          schema:
            type: string
            enum:
              - en
              - es
        - in: query
          name: tag
          description: A text that can be used to group several orders together under a
            single tag. For example, to group all ESD orders, the tag parameter
            can be used by sending it with “esd” for its value. The text can be
            anything you want but it is recommended to use a single word or as
            few concatenated words as possible, without spaces.
          required: false
          schema:
            type: string
        - in: query
          name: customerOrderNumber
          description: Can be used to send the client’s own order number to Intcomex, so
            that both orders (the client order and the Intcomex order) are
            linked for any reason that may be needed, like reporting or any
            further processing outside the scope of IWS.
          required: false
          schema:
            type: string
        - in: query
          name: locationId
          description: Can be used to indicate the location where the order
            will be placed, so the order will be linked to the warehouse for the specifict location.
          required: false
          schema:
            type: string
        - in: query
          name: carrierId
          description: Can be used to indicate the carrier's ID for shipments.
          required: false
          schema:
            type: string
