  /generatetokens:
    post:
      operationId: generateTokens
      summary: Generate ESD Product Tokens
      tags:
        - ESD
      description: >-
        The **GenerateTokens** API is used to request the ESD tokens from all
        downloadable products within an order, which will contain the product
        keys, download links, etc.


        Obviously, this method only works on ESD products (product type = “downloadable”) within a purchase order. Tokens can only be requested once per order.


        Any subsequent requests to this API on the same order will only return the same tokens already generated the first time for that order and product specified.


        Making these requests more than once on the same order is normally neither recommended nor necessary.
      requestBody:
        description: An object with the number of an order that contains the ESD products
          for which the tokens will be generated.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimpleRequestOrder"
            example:
              OrderNumber: "601433"
      responses:
        "200":
          description: A list of DigitalProduct objects, each containing an array called
            Tokens, which lists Token objects that represent the token received.
            These include a product key, and in some cases, a download link.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigitalProduct"
              example:
                - Sku: SE001MSE08
                  Tokens:
                    - ProductKey: 69502-58426-39992-70139-37075
                      LinkUrl: https://iws.intcomex.com/api/iwsapi/Download?key=1e0295d7-fa72-4062-b823-74e4f86c618f
