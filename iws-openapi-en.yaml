  /updateorder:
    post:
      operationId: updateOrder
      summary: Update Order
      tags:
        - Orders
      description: >
        The **UpdateOrder** API allows updating certain information on an order
        after it has been placed.The following properties are the only ones that can be updated in an order:

          - StoreOrder               
          - TaxRegistrationNumber    
          - Shipments                
          - TaxesIncludedInPrice     
          - CarrierId    
          - Attachments            

        > **Note:** If the order is canceled, no properties can be updated, and an exception 
          will be returned if attempted. If the order is invoiced, only the Attachments property can be updated.
      requestBody:
        description: An object with the number of an order and the data to be updated.
        content:
          application/json:
            schema:
