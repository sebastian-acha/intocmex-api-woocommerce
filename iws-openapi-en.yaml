  /getorderstatus:
    get:
      operationId: getOrderStatus
      summary: Get Order Status
      tags:
        - Orders
      description: >
        The **GetOrderStatus** API can be used to obtain the current status of a
        specific order. The possible order statuses are:
          
          | Code | Description      |
          | :--: | :--------------- |
          | 1    | Open             |
          | 2    | In process       |
          | 3    | Back Order       |
          | 4    | Ready to deliver |
          | 5    | Invoiced/Closed  |
          | 6    | Canceled         |
          | 7    | Delivered        |
      parameters:
        - in: query
          name: orderNumber
          description: The Intcomex order number to obtain.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: An Order object which represents the status of the Intcomex order
            that was requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionStatus"
              example:
                Status:
                  StatusCode: "1"
                  Description: Open
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/InvalidTimeStamp"
                  - $ref: "#/components/schemas/UnauthorizedClientIp"
                  - $ref: "#/components/schemas/InvalidSignature"
                  - $ref: "#/components/schemas/InvalidApiKey"
              examples:
                Request time stamp expired:
                  summary: Request time stamp expired
                  value:
                    Message: Request time stamp no longer valid.
                    ErrorCode: 12
                    Reference: 4b803e62-0cb8-4662-bb5b-a480adb83b57
                    TimeStamp: 2019-10-07T20:38:13.132Z
                Invalid IP address:
                  summary: Invalid IP address
                  value:
                    Message: IP address not registered.
                    ErrorCode: 14
                    Reference: aaa7c14d-b114-4153-b0fb-5681df859b31
                    ClientIp: 10.212.1.214
                Invalid signature:
                  summary: Invalid signature
